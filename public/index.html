<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Practice.js Playground</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  </head>
  <body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-md bg-body-tertiary border-bottom px-3 py-2">
      <a class="navbar-brand fw-semibold" href="#">Practice.js Playground</a>

      <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse" data-bs-target="#navbarControls" aria-controls="navbarControls" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarControls">
        <div class="navbar-nav ms-auto d-flex flex-row flex-wrap align-items-center gap-2 mt-2 mt-md-0">

          <!-- Options button — opens offcanvas -->
          <button class="btn btn-outline-secondary btn-sm" type="button" data-bs-toggle="offcanvas" data-bs-target="#optionsOffcanvas" aria-controls="optionsOffcanvas">
            <i class="bi bi-sliders me-1"></i>Options
          </button>

          <!-- Mode select -->
          <div class="d-flex align-items-center gap-1">
            <label class="form-label mb-0 text-nowrap small fw-semibold" for="modeSelect">Mode</label>
            <select class="form-select form-select-sm" id="modeSelect" style="min-width:110px">
              <option value="PRACTICE" selected>PRACTICE</option>
              <option value="QUIZ">QUIZ</option>
              <option value="EDIT">EDIT</option>
            </select>
          </div>

          <!-- Timer + Max Questions (hidden in EDIT mode) -->
          <div id="timerRow" class="d-flex align-items-center gap-2">
            <div class="d-flex align-items-center gap-1">
              <label class="form-label mb-0 text-nowrap small fw-semibold" for="timerInput">
                <i class="bi bi-stopwatch me-1"></i>Timer (s)
              </label>
              <input type="number" class="form-control form-control-sm" id="timerInput" value="0" min="0" style="width:80px">
            </div>
            <div class="d-flex align-items-center gap-1">
              <label class="form-label mb-0 text-nowrap small fw-semibold" for="maxQInput">Max Q</label>
              <input type="number" class="form-control form-control-sm" id="maxQInput" placeholder="all" min="1" style="width:70px">
            </div>
            <button class="btn btn-sm btn-primary" id="applyBtn" type="button">
              <i class="bi bi-arrow-clockwise me-1"></i>Apply
            </button>
          </div>

        </div>
      </div>
    </nav>

    <!-- Options Offcanvas -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="optionsOffcanvas" aria-labelledby="optionsOffcanvasLabel" style="width:min(500px,95vw)">
      <div class="offcanvas-header border-bottom">
        <h5 class="offcanvas-title" id="optionsOffcanvasLabel">
          <i class="bi bi-sliders me-2"></i>Questions JSON
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body d-flex flex-column gap-3">
        <p class="text-muted small mb-0">Edit the JSON below and click <strong>Load</strong> to apply changes. This updates the current session only.</p>
        <textarea class="form-control font-monospace flex-grow-1" id="questionsJsonArea" rows="20" spellcheck="false" style="resize:vertical;min-height:300px"></textarea>
        <div id="jsonErrorMsg" class="text-danger small d-none"></div>
        <div class="d-flex gap-2 justify-content-end">
          <button type="button" class="btn btn-outline-secondary btn-sm" id="resetJsonBtn">
            <i class="bi bi-arrow-counterclockwise me-1"></i>Reset
          </button>
          <button type="button" class="btn btn-primary btn-sm" id="loadJsonBtn">
            <i class="bi bi-upload me-1"></i>Load
          </button>
        </div>
      </div>
    </div>

    <!-- Alert area -->
    <div id="alertArea" class="px-3 mt-2"></div>

    <!-- Main mount point -->
    <div id="practice-main" class="px-3 mt-2"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script type="module" src="practice.bundle.js"></script>
    <script type="module">

      // ── Helpers ──────────────────────────────────────────────────────────────

      function showAlert(message, type) {
        var t = type || 'danger';
        var area = document.getElementById('alertArea');
        var wrapper = document.createElement('div');
        wrapper.innerHTML = [
          '<div class="alert alert-' + t + ' alert-dismissible" role="alert">',
          '  <div>' + message + '</div>',
          '  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>',
          '</div>'
        ].join('');
        area.innerHTML = '';
        area.append(wrapper);
      }

      // ── State ─────────────────────────────────────────────────────────────────

      var currentQuestions = [];
      var currentMode = 'PRACTICE';

      // ── Build a fresh PracticeMaker ────────────────────────────────────────

      function buildInstance(questions, mode, timer, maxQ) {
        var root = document.getElementById('practice-main');

        // destroy previous instance to clear any running timers
        if (window.__prakticeMaker && window.__prakticeMaker.destroy) {
          window.__prakticeMaker.destroy();
        }

        root.innerHTML = '';

        var qs = (maxQ && maxQ > 0 && maxQ < questions.length)
          ? questions.slice(0, maxQ)
          : questions;

        var opts = {
          mode: mode,
          error: function(msg) { showAlert(msg, 'danger'); }
        };

        if (mode === 'QUIZ' && timer && timer > 0) {
          opts.timer = timer;
        }

        var pm = new PracticeMaker(root, opts);

        if (mode === 'EDIT') {
          pm.setEditable(true);
        } else {
          pm.setEditable(false);
        }

        pm.setQuestions(qs);

        window.__prakticeMaker = pm;
        return pm;
      }

      // ── Mode helpers ───────────────────────────────────────────────────────

      function applyMode() {
        currentMode = document.getElementById('modeSelect').value;
        var timer = parseInt(document.getElementById('timerInput').value) || 0;
        var maxQRaw = parseInt(document.getElementById('maxQInput').value);
        var maxQ = isNaN(maxQRaw) ? null : maxQRaw;
        buildInstance(currentQuestions, currentMode, timer, maxQ);
      }

      function syncTimerRowVisibility() {
        var mode = document.getElementById('modeSelect').value;
        var row = document.getElementById('timerRow');
        if (mode === 'EDIT') {
          row.classList.add('d-none');
        } else {
          row.classList.remove('d-none');
        }
      }

      // ── Options offcanvas ──────────────────────────────────────────────────

      var offcanvasEl  = document.getElementById('optionsOffcanvas');
      var jsonArea     = document.getElementById('questionsJsonArea');
      var jsonErrorMsg = document.getElementById('jsonErrorMsg');

      offcanvasEl.addEventListener('show.bs.offcanvas', function() {
        jsonArea.value = JSON.stringify(currentQuestions, null, 2);
        jsonErrorMsg.classList.add('d-none');
        jsonErrorMsg.textContent = '';
      });

      document.getElementById('loadJsonBtn').addEventListener('click', function() {
        jsonErrorMsg.classList.add('d-none');
        var parsed;
        try {
          parsed = JSON.parse(jsonArea.value);
          if (!Array.isArray(parsed)) throw new Error('Root value must be a JSON array.');
        } catch (e) {
          jsonErrorMsg.textContent = 'JSON error: ' + e.message;
          jsonErrorMsg.classList.remove('d-none');
          return;
        }

        currentQuestions = parsed;

        var timer = parseInt(document.getElementById('timerInput').value) || 0;
        var maxQRaw = parseInt(document.getElementById('maxQInput').value);
        var maxQ = isNaN(maxQRaw) ? null : maxQRaw;
        buildInstance(currentQuestions, currentMode, timer, maxQ);

        bootstrap.Offcanvas.getInstance(offcanvasEl).hide();
        showAlert('Questions loaded successfully.', 'success');
      });

      document.getElementById('resetJsonBtn').addEventListener('click', function() {
        jsonArea.value = JSON.stringify(currentQuestions, null, 2);
        jsonErrorMsg.classList.add('d-none');
      });

      // ── Wire up navbar controls ────────────────────────────────────────────

      document.getElementById('modeSelect').addEventListener('change', function() {
        syncTimerRowVisibility();
        currentMode = document.getElementById('modeSelect').value;
        applyMode();
      });

      document.getElementById('applyBtn').addEventListener('click', applyMode);

      // ── Bootstrap ─────────────────────────────────────────────────────────

      async function init() {
        // Read URL params so tests (and direct links) can pre-configure mode/timer/editable
        var params = new URLSearchParams(window.location.search);
        var paramMode     = params.get('mode');
        var paramTimer    = parseInt(params.get('timer')) || 0;
        var paramEditable = params.get('editable');

        if (paramMode && ['PRACTICE', 'QUIZ', 'EDIT'].includes(paramMode)) {
          currentMode = paramMode;
          document.getElementById('modeSelect').value = paramMode;
          syncTimerRowVisibility();
        }

        if (paramTimer > 0) {
          document.getElementById('timerInput').value = paramTimer;
        }

        try {
          var res = await fetch('./data/questions.json');
          if (!res.ok) throw new Error('Network response was not ok');
          currentQuestions = await res.json();
        } catch (e) {
          showAlert('Failed to load questions: ' + e.message, 'danger');
          currentQuestions = [];
        }

        syncTimerRowVisibility();
        var pm = buildInstance(currentQuestions, currentMode, paramTimer, null);

        // Apply editable param after instance is built (buildInstance already handles EDIT mode,
        // but an explicit ?editable=1 should also enable edit badge in PRACTICE/QUIZ modes)
        if (paramEditable === '1') {
          pm.setEditable(true);
        }
      }

      init();
    </script>
  </body>
</html>
