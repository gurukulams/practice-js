<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  </head>
  <body class="my-4 px-5">

    <div id="practice-main"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  

    <script type="module" src="practice.bundle.js"></script>
    <script type="module">
        
        // Initialize your logic here
        const practice = new PracticeMaker(
          document.getElementById("practice-main"),
          { "error":(message) => {console.error(message)}}
        );

        // Fetch the data from your src/data folder
      // Note: The path is relative to this index.html file
      fetch('./data/questions.json')
      .then(response => {
          if (!response.ok) throw new Error('Network response was not ok');
          return response.json();
      })
      .then(questions => {
          // Use your class method to handle the data
          practice.setQuestions(questions);
          console.log("Questions loaded and passed to PracticeMaker");
      })
      .catch(error => {
          console.error('There was a problem with the fetch operation:', error);
          rootElement.innerHTML = '<p class="text-danger">Failed to load questions.</p>';
      });
    </script>

   

</body>
</html>
